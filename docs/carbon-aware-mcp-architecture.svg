<svg xmlns="http://www.w3.org/2000/svg" width="680" height="380" viewBox="0 0 680 380" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" role="img">
  <title>carbon-aware-mcp architecture</title>
  <desc>An MCP client sends a Bearer JWT to the FastMCP server, which verifies the token, traces the call through observability middleware, and executes one of four tools that query the UK Carbon Intensity API.</desc>
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="220" y="40" width="260" height="300" rx="16" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="350" y="66" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">carbon-aware-mcp</text>
  <text x="350" y="84" text-anchor="middle" font-size="12" fill="#0F6E56">FastMCP · streamable HTTP</text>

  <rect x="240" y="104" width="220" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="350" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">JWT verifier</text>
  <text x="350" y="144" text-anchor="middle" font-size="12" fill="#854F0B">sig · iss · aud · scope</text>

  <rect x="240" y="176" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="350" y="198" text-anchor="middle" font-size="13" font-weight="600" fill="#3C3489">Observability middleware</text>
  <text x="350" y="216" text-anchor="middle" font-size="12" fill="#534AB7">JSON logs · OTel spans</text>

  <rect x="240" y="248" width="220" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="350" y="270" text-anchor="middle" font-size="13" font-weight="600" fill="#712B13">Tools ×4</text>
  <text x="350" y="288" text-anchor="middle" font-size="12" fill="#993C1D">greenest_window + 3 more</text>

  <rect x="40" y="150" width="140" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="110" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">MCP client</text>
  <text x="110" y="190" text-anchor="middle" font-size="12" fill="#5F5E5A">Bearer JWT</text>

  <rect x="520" y="150" width="130" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="585" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#0C447C">Carbon API</text>
  <text x="585" y="190" text-anchor="middle" font-size="12" fill="#185FA5">UK grid · free</text>

  <line x1="182" y1="178" x2="216" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="482" y1="178" x2="516" y2="178" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#a)"/>
</svg>
